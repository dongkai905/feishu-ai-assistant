# 全局配置
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# 告警规则文件
rule_files:
  # - "alert_rules.yml"

# 告警管理器配置
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           # - alertmanager:9093

# 抓取配置
scrape_configs:
  # Prometheus自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s

  # 飞书AI助手API监控
  - job_name: 'feishu-ai-assistant-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'feishu-ai-assistant-api'

  # Node Exporter监控（如果需要）
  # - job_name: 'node-exporter'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
  #   scrape_interval: 30s

  # cAdvisor容器监控（如果需要）
  # - job_name: 'cadvisor'
  #   static_configs:
  #     - targets: ['cadvisor:8080']
  #   scrape_interval: 30s

  # Redis监控
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s
    metrics_path: '/metrics'
    params:
      format: [prometheus]

  # PostgreSQL监控（如果需要）
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['db:5432']
  #   scrape_interval: 30s
  #   metrics_path: '/metrics'

  # Nginx监控（如果需要）
